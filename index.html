<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Move The Needle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- SETUP WIZARD -->
  <div id="wizard" class="screen hidden">
    <div class="wiz-head">
      <div class="wiz-brand">Move The Needle</div>
      <div class="wiz-progress">
        <span id="wiz-label">Step 1 of 5</span>
        <div class="progress-track"><div id="wiz-fill" class="progress-fill"></div></div>
      </div>
    </div>
    <div id="wiz-body" class="wiz-body"></div>
    <div class="wiz-foot">
      <button id="wiz-back" class="btn-ghost hidden">← Back</button>
      <button id="wiz-next" class="btn-prime">Next →</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main" class="screen hidden">
    <header class="topbar">
      <div class="topbar-brand">Move The Needle</div>
      <div id="topbar-date" class="topbar-date"></div>
    </header>

    <div id="timer-banner" class="timer-banner hidden">
      <span class="banner-dot"></span>
      <span id="banner-cat" class="banner-cat"></span>
      <span id="banner-time" class="banner-time">00:00:00</span>
      <button class="banner-link" onclick="switchTab('work')">Work →</button>
    </div>

    <div id="tabs">
      <div id="tab-home"   class="tab-panel" data-panel="home"></div>
      <div id="tab-work"   class="tab-panel hidden" data-panel="work"></div>
      <div id="tab-week"   class="tab-panel hidden" data-panel="week"></div>
      <div id="tab-review" class="tab-panel hidden" data-panel="review"></div>
    </div>

    <nav class="bottomnav">
      <button class="nav-btn active" data-tab="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Home
      </button>
      <button class="nav-btn" data-tab="work">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Work
      </button>
      <button class="nav-btn" data-tab="week">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Week
      </button>
      <button class="nav-btn" data-tab="review">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Review
      </button>
    </nav>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden">
    <div id="modal-back" class="modal-backdrop"></div>
    <div class="modal-sheet">
      <button id="modal-close" class="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- CONFETTI -->
  <div id="confetti-stage" aria-hidden="true"></div>

  <!-- TOAST -->
  <div id="toast-stage" aria-live="polite"></div>

</div>
<script src="app.js"></script>
</body>
</html>
